version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prelegal
    ports:
      - "8000:8000"
    volumes:
      - prelegal_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/prelegal.db
    restart: unless-stopped

volumes:
  prelegal_data:
    driver: local
