version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prelegal-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./templates:/app/templates
      - prelegal_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/prelegal.db
    working_dir: /app/backend
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: prelegal-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    working_dir: /app
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    command: npm run dev
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  prelegal_data:
    driver: local
